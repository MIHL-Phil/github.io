project:
  type: website
  output-dir: _site
  resources:
    - "images/"
    - "assets/"

website:
  title: "The Experience Machine"
  site-url: "https://faculty.washington.edu/masiello/"
  repo-url: "https://github.com/MasielloGroup/MasielloGroupWebsite"
  favicon: ./assets/images/ruins.jpg
  google-analytics: "UA-177339812-1"
  twitter-card: true
  back-to-top-navigation: true
  page-navigation: false
  search: true

  navbar:
    logo: "./assets/images/new-babbage.png"
    logo-alt: "MIHL"
    title: false
    background: dark
    left:
      - text: "People"
        href: people/index.qmd
      - text: "Current Courses"
        menu:
          - text: "Logic, Spring 2026"
            href: courses/logic/syllabus.qmd
          - text: "Intro to Philosophy — TTH"
            href: courses/intro/sections/tth.qmd
          - text: "Intro to Philosophy — MW"
            href: courses/intro/sections/mw.qmd
          - text: "Philosophy of Law"
            href: courses/law/syllabus.qmd
          - text: "Philosophy of Mind"
            href: courses/phil-mind/syllabus.qmd
      - text: "Discord"
        href: dmref/index.qmd
      - text: "Contact"
        href: contact.qmd
    right:
      - icon: github
        href: "https://github.com/redapemusic35"
        aria-label: GitHub

  sidebar:
    - id: portfolio
      title: "Teaching Portfolio"
      style: "docked"
      collapse-level: 1
      contents:
        - portfolio/index.qmd
        - portfolio/intro.qmd
        - portfolio/resume-cv.qmd
        - portfolio/summary.qmd

    - id: logic
      title: "Logic, Spring 2026"
      style: "docked"
      collapse-level: 2
      contents:
        - courses/logic/syllabus.qmd
        - section: "Weeks"
          contents:
            - text: "Coming soon"
              href: courses/logic/syllabus.qmd
        - section: "Assignments"
          contents:
            - text: "Coming soon"
              href: courses/logic/syllabus.qmd

    - id: intro
      title: "Intro to Philosophy"
      style: "docked"
      collapse-level: 2
      contents:
        - courses/intro/syllabus.qmd
        - section: "Sections"
          contents:
            - courses/intro/sections/tth.qmd
            - courses/intro/sections/mw.qmd
        - section: "Weeks"
          contents:
            - text: "Coming soon"
              href: courses/intro/syllabus.qmd

    - id: law
      title: "Philosophy of Law"
      style: "docked"
      collapse-level: 2
      contents:
        - courses/law/syllabus.qmd
        - section: "Assignments"
          contents:
            - text: "Coming soon"
              href: courses/law/syllabus.qmd

    - id: phil-mind
      title: "Philosophy of Mind"
      style: "docked"
      collapse-level: 2
      contents:
        - courses/phil-mind/syllabus.qmd
        - section: "Weeks"
          contents: courses/phil-mind/weeks

  page-footer:
    left: "© 2026 The Moral Imagination and Hope Workshop and Laboratory"
    right:
      - text: "Made with Quarto"
        href: "https://quarto.org"

format:
  html:
    theme:
      light: [flatly, assets/custom.scss]
      dark: [darkly, assets/custom.scss]
    toc: true
    toc-depth: 3
    smooth-scroll: true
    link-external-newwindow: true

execute:
  freeze: auto
